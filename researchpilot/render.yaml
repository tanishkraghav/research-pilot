services:
  - type: web
    name: researchpilot-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    plan: free

  - type: static
    name: researchpilot-frontend
    env: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
